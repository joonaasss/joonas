<!DOCTYPE html>
<html lang="fi">
<head>
<meta charset="UTF-8">
<title>Joonaksen Tasohyppely</title>
<style>
body{
    margin:0;
    background:#222;
    display:flex;
    justify-content:center;
}
canvas{
    background:#87CEEB;
    margin-top:20px;
    border:4px solid black;
}

#menu{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    width:420px;
    background:white;
    border:4px solid black;
    border-radius:10px;
    padding:20px;
    text-align:center;
    font-family:Arial,sans-serif;
    z-index:100;
}

#menu button{
    font-size:20px;
    padding:10px 25px;
    cursor:pointer;
    margin-top:15px;
}

#controls{
    display:none;
}

@media (pointer: coarse){

#controls{

    display:none;
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    pointer-events:none;
    z-index:200;

}

#controls button{

    position:absolute;

    width:75px;
    height:75px;

    border:none;
    border-radius:50%;

    background:rgba(255,255,255,0.45);
    backdrop-filter:blur(3px);

    font-size:34px;
    font-weight:bold;

    pointer-events:auto;
    touch-action:none;
}

/* Vasen */
#left{
    left:25px;
    bottom:30px;
}

/* Oikea */
#right{
    left:120px;
    bottom:30px;
}

/* Hyppy */
#jump{
    right:30px;
    bottom:40px;
}

/* Dash */
#dash{
left:72px;
    bottom:120px;
    
}

}

</style>
</head>
<body>

<div id="menu">
    <h2>Tervetuloa Joonaksen OMAAN peliin!
Kiitos kun pelaat t. Joonas</h2>

    <p><b>Ohjaimet:</b></p>

    <p>⬅️ ➡️ = Liiku</p>
    <p>⬆️ tai Välilyönti = Hyppää</p>
    <p>Shift + nuolinäppäin = Nopea liikkuminen</p>

    <p>Vältä piikkejä ja pääse kultaiselle maalille!</p>

    <button id="startBtn">OK, pelaamaan!</button>
</div>

<canvas id="game" width="900" height="500"></canvas>

<div id="controls">

    <button id="left">◀</button>

    <button id="jump">▲</button>

    <button id="right">▶</button>

    <button id="dash">⚡</button>

</div>

<script>

const canvas=document.getElementById("game");
const ctx=canvas.getContext("2d");

const menu = document.getElementById("menu");
const startBtn = document.getElementById("startBtn");

const leftBtn = document.getElementById("left");
const rightBtn = document.getElementById("right");
const jumpBtn = document.getElementById("jump");
const dashBtn = document.getElementById("dash");

const keys = {};
let gameStarted = false;
document.addEventListener("keydown",e=>keys[e.key]=true);
document.addEventListener("keyup",e=>keys[e.key]=false);

let current = 0;
let startTime = Date.now();

const player={
    x:60,y:320,w:30,h:30,
    vx:0,vy:0,
    speed:0.6,
    maxSpeed:6,
    friction:0.85,
    jumpPower:12,
    jumps:2,
    maxJumps:2,
    jumpPressed:false,
    canDash:true,
    dashSpeed:18,
    dashTimer:0,
    dashDir:1
};

const levels=[

{
goal:{x:840,y:320,w:40,h:40},
platforms:[
{x:20,y:360,w:100,h:20},
{x:180,y:360,w:150,h:20},
{x:420,y:300,w:120,h:20},
{x:650,y:250,w:140,h:20}
],
spikes:[],
movingPlatforms:[]
},

{
goal:{x:840,y:120,w:40,h:40},
platforms:[
{x:20,y:360,w:100,h:20},
{x:120,y:380,w:100,h:20},
{x:270,y:320,w:80,h:20},
{x:420,y:250,w:80,h:20},
{x:570,y:180,w:80,h:20},
{x:730,y:120,w:80,h:20}
],
spikes:[

{x:600,y:160,w:30,h:20}
],
movingPlatforms:[]
},

{

platforms:[

{x:80,y:380,w:60,h:20},
{x:190,y:330,w:60,h:20},
{x:310,y:280,w:60,h:20},
{x:450,y:230,w:60,h:20},
{x:590,y:180,w:60,h:20},
{x:730,y:130,w:60,h:20},
{x:820,y:80,w:60,h:20}
],
spikes:[
{x:205,y:310,w:30,h:20},
{x:465,y:210,w:30,h:20},
{x:745,y:110,w:30,h:20}
],
coins:[],
movingPlatforms:[]
},

{
goal:{x:840,y:80,w:40,h:40},
platforms:[
{x:20,y:360,w:100,h:20},
{x:180,y:320,w:100,h:20},
{x:360,y:260,w:100,h:20},
{x:540,y:200,w:100,h:20},
{x:740,y:140,w:100,h:20}
],
spikes:[
{x:395,y:240,w:30,h:20},
{x:575,y:180,w:30,h:20}
],
coins:[],
movingPlatforms:[]
},

{
start:{x:60,y:320},

goal:{x:840,y:100,w:40,h:40},

platforms:[
{x:20,y:400,w:120,h:20},
{x:180,y:350,w:120,h:20},
{x:360,y:300,w:120,h:20},
{x:540,y:250,w:120,h:20},
{x:720,y:200,w:120,h:20}
],

spikes:[
{x:200,y:330,w:30,h:20},
{x:380,y:280,w:30,h:20},
{x:560,y:230,w:30,h:20},
{x:740,y:180,w:30,h:20}
],

coins:[],

movingPlatforms:[]
},

{
start:{x:60,y:320},

goal:{x:840,y:60,w:40,h:40},

platforms:[
{x:20,y:420,w:100,h:20},
{x:180,y:370,w:100,h:20},
{x:340,y:320,w:100,h:20},
{x:520,y:270,w:100,h:20},
{x:700,y:220,w:100,h:20}
],

spikes:[

{x:380,y:300,w:30,h:20},

{x:740,y:200,w:30,h:20}
],

coins:[],

movingPlatforms:[
{
x:150,
y:300,
w:120,
h:20,
speed:2,
minX:150,
maxX:350
},
{
x:400,
y:220,
w:120,
h:20,
speed:-2.5,
minX:350,
maxX:600
},
{
x:600,
y:150,
w:120,
h:20,
speed:1.8,
minX:550,
maxX:750
}
]
},

{
goal:{x:860,y:60,w:40,h:40},
platforms:[
{x:20,y:400,w:80,h:20},

{x:420,y:240,w:80,h:20},
{x:560,y:190,w:80,h:20},
{x:700,y:140,w:80,h:20}
],
spikes:[
{x:150,y:320,w:30,h:20},
{x:290,y:270,w:30,h:20},
{x:430,y:220,w:30,h:20},
{x:570,y:170,w:30,h:20}
],
coins:[],
movingPlatforms:[
{
x:200,y:300,w:100,h:20,
speed:2,minX:150,maxX:400
},
{
x:500,y:200,w:100,h:20,
speed:-3,minX:450,maxX:700
}
]
}

];

function rect(a,b){
return a.x<b.x+b.w &&
a.x+a.w>b.x &&
a.y<b.y+b.h &&
a.y+a.h>b.y;
}

function loadLevel(){
player.x=60;
player.y=320;
player.vx=0;
player.vy=0;
player.jumps=player.maxJumps;
player.canDash=true;
player.dashTimer=0;
player.jumpPressed=false;
}

function respawn(){
player.x=60;
player.y=320;
player.vx=0;
player.vy=0;
player.jumps=player.maxJumps;
player.canDash=true;
player.dashTimer=0;
}

function update(){

// gravity
player.vy += 0.7;

// movement
if(player.dashTimer<=0){
    if(keys["ArrowLeft"]) player.vx -= player.speed;
    if(keys["ArrowRight"]) player.vx += player.speed;
    player.vx *= player.friction;
}

// dash
if(keys["Shift"] && player.canDash){
    if(keys["ArrowRight"]){
        player.dashDir=1;
        player.vx=player.dashSpeed;
        player.dashTimer=16;
    }
    if(keys["ArrowLeft"]){
        player.dashDir=-1;
        player.vx=-player.dashSpeed;
        player.dashTimer=16;
    }
    player.canDash=false;
}

if(player.dashTimer>0){
    player.dashTimer--;
}

// jump
if((keys["ArrowUp"] || keys[" "]) && !player.jumpPressed && player.jumps>0){
    player.vy=-player.jumpPower;
    player.jumps--;
    player.jumpPressed=true;
}

if(!keys["ArrowUp"] && !keys[" "]){
    player.jumpPressed=false;
}

// apply movement
player.x += player.vx;
player.y += player.vy;

// ground reset
player.onGround=false;

// platforms
for(const p of levels[current].platforms){
if(rect(player,p) && player.vy>=0){
    player.y=p.y-player.h;
    player.vy=0;
    player.jumps=player.maxJumps;
    player.canDash=true;
}

if(player.y > 500){
    respawn();
}
}

// spikes
for(const s of levels[current].spikes){
if(rect(player,s)){
    respawn();
}
}

// goal
if(rect(player,levels[current].goal)){
    current++;

    if(current>=levels.length){
        let t=(Date.now()-startTime)/1000;
        alert("Voitit pelin! Aika: "+t.toFixed(2)+"s");
        current=0;
        startTime=Date.now();
    }

    loadLevel();
}

}

function draw(){

ctx.clearRect(0,0,900,500);

ctx.fillStyle="black";
ctx.fillRect(0,450,900,50);

ctx.fillStyle="green";
for(const p of levels[current].platforms){
ctx.fillRect(p.x,p.y,p.w,p.h);
}

ctx.fillStyle="red";
for(const s of levels[current].spikes){
ctx.fillRect(s.x,s.y,s.w,s.h);
}

ctx.fillStyle="gold";
let g=levels[current].goal;
ctx.fillRect(g.x,g.y,g.w,g.h);

ctx.fillStyle="blue";
ctx.fillRect(player.x,player.y,player.w,player.h);

ctx.fillStyle="black";
ctx.fillText("Taso "+(current+1),20,30);

let time=(Date.now()-startTime)/1000;
ctx.fillText("Aika: "+time.toFixed(2)+"s",20,60);

}

function loop(){

    if(gameStarted){
        update();
        draw();
    }

    requestAnimationFrame(loop);

}

startBtn.onclick = function(){

    menu.style.display = "none";
    document.getElementById("controls").style.display = "block";

    gameStarted = true;
    startTime = Date.now();

};


function hold(button,key){

    button.addEventListener("touchstart",e=>{
        e.preventDefault();
        keys[key]=true;
    });

    button.addEventListener("touchend",e=>{
        e.preventDefault();
        keys[key]=false;
    });

}

hold(leftBtn,"ArrowLeft");
hold(rightBtn,"ArrowRight");
hold(jumpBtn,"ArrowUp");

dashBtn.addEventListener("touchstart",e=>{
    e.preventDefault();
    keys["Shift"]=true;
});

dashBtn.addEventListener("touchend",e=>{
    e.preventDefault();
    keys["Shift"]=false;
});


loadLevel();
loop();

</script>

</body>
</html>
